<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Team Toy — Landing</title>
  <meta name="description" content="Landing page del equipo Team Toy" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header>
    <h1>Team Toy</h1>
    <p>Héroe principal</p>
  </header>
<nav>
    <a href="#about">Sobre</a>
    <a href="#members">Miembros</a>
    <a href="#contact">Contacto</a>
  </nav>
  <div id="hero-banner">
    <p>Bienvenido a nuestro proyecto de práctica</p>
  </div>
  <main>
    <section id="about">
      <h2>Sobre el equipo</h2>
      <p>Somos un equipo aprendiendo Git & GitHub.</p>
    </section>

    <section id="members">
      <h2>Miembros</h2>
      <ul id="member-list"></ul>
    </section>

    <section id="contact">
      <h2>Contacto</h2>
      <form id="contact-form" action="#" method="POST">
        <input type="text" name="name" placeholder="Nombre" required />
        <input type="email" name="email" placeholder="Email" required />
        <textarea name="message" placeholder="Mensaje" required></textarea>
        <button type="submit">Enviar</button>
      </form>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 Team Toy</p>
  </footer>

  <script src="js/main.js"></script>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXX"></script>
</body>
</html>
